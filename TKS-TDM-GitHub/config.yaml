# Model hyperparameters
model:
  signal_length: 5119        # L: input signal length per channel (time steps)
  num_points: 8              # n: number of temporal key points selected by KPSM
  in_channels: 9             # C_in: number of input sensor channels (3 sensors × 3 axes)
  downsample_ratio: 8        # dr: MSFRM temporal downsampling factor (L → L/dr = 640)
  num_classes: 16            # C: number of fault condition categories
  num_iters: 6               # N: number of KPSM key-point selection iterations
  depth: 14                  # total Transformer depth (KPSM: 6 layers + CCM: 8 layers)
  embed_dim: 288             # emb: feature embedding dimension
  num_heads: 6               # h: number of MSA attention heads
  mlp_ratio: 3.0             # FFN hidden-dim ratio (emb × mlp_ratio)
  offset_gamma: 1.0          # γ: offset scaling factor in KPSM
  offset_bias: true          # whether the offset prediction FC has a bias term
  drop_rate: 0.0             # dropout rate
  attn_drop_rate: 0.0        # attention dropout rate
  drop_path_rate: 0.1        # stochastic depth (drop path) rate

# Training hyperparameters
training:
  batch_size: 32             # mini-batch size
  epochs: 100                # total training epochs
  optimizer: adamw           # optimizer type
  lr: 5.0e-4                 # initial learning rate
  weight_decay: 0.05         # AdamW weight decay (L2 regularisation)
  momentum: 0.9              # SGD momentum (unused for AdamW)
  clip_grad: 1.0             # gradient clipping max norm
  label_smoothing: 0.1       # label smoothing factor for cross-entropy loss
  amp: true                  # enable mixed-precision training (FP16)

# Learning rate scheduler
scheduler:
  type: cosine               # cosine annealing schedule
  warmup_epochs: 3           # number of linear warm-up epochs
  min_lr: 1.0e-5             # minimum learning rate at end of cosine schedule
  cooldown_epochs: 10        # cooldown epochs after cosine decay

# Model EMA (Exponential Moving Average)
ema:
  enabled: true              # use EMA for evaluation and checkpointing
  decay: 0.99996             # EMA decay rate

# Data settings
data:
  train_data_path: "your/train/data/path"   # path to training data (.npy)
  train_label_path: "your/train/label/path" # path to training labels (.npy)
  val_data_path: "your/val/data/path"       # path to validation data (.npy)
  val_label_path: "your/val/label/path"     # path to validation labels (.npy)
  test_data_path: "your/test/data/path"     # path to test data (.npy)
  test_label_path: "your/test/label/path"   # path to test labels (.npy)
  num_workers: 4             # DataLoader worker processes
  train_ratio: 0.64          # training set ratio
  val_ratio: 0.20            # validation set ratio
  test_ratio: 0.16           # test set ratio

# Checkpointing
checkpoint:
  save_path: "checkpoints/best_model.pth"   # path to save the best model
  resume: ""                                 # path to resume from (empty = start fresh)

# Logging
logging:
  log_file: "logs/training_log.txt"         # path to save training log
  log_interval: 10                           # print log every N batches
